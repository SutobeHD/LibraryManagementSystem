# Dependabot configuration — Schicht A Security Hardening 2026
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy:
# - Weekly checks on Mondays (low noise)
# - Auto-PRs only for SECURITY updates (not feature bumps)
# - Grouped updates per ecosystem (one PR for all minor bumps)
# - All PRs require review (no auto-merge)

version: 2
updates:
  # --- Frontend NPM (highest risk: largest transient surface) ---
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "frontend"
    # Group all non-security minor/patch into single PR
    groups:
      frontend-minor-patch:
        # eslint-plugin-react-refresh excluded: its 0.4->0.5 bump pulls a peer
        # range that breaks `npm install` (ERESOLVE) — needs isolated handling.
        exclude-patterns:
          - "eslint-plugin-react-refresh"
        update-types:
          - "minor"
          - "patch"
    # Reject anything that increases major version (manual review only)
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # --- Root NPM (Tauri CLI + concurrently) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "security"
    groups:
      root-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # --- Python (FastAPI backend) ---
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "backend"
    groups:
      python-minor-patch:
        # pyrekordbox excluded: as a 0.x package its SemVer-"minor" bumps
        # (0.1->0.4) are breaking and collide with documented rbox workarounds
        # (anlz_safe, usb_one_library). Gets its own PR for isolated review.
        exclude-patterns:
          - "pyrekordbox"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # --- Cargo (Rust audio engine) ---
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "rust"
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # --- GitHub Actions (when added later) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "ci"
      - "security"
