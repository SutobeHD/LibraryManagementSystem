name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref — saves minutes on rebase-heavy PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint-test:
    name: Python — ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          # Install only what's safely pip-resolvable on Linux runners.
          # Heavy native deps (madmom, essentia, rbox) get `ignore_missing_imports`
          # in mypy + a per-file skip in pytest, so CI doesn't need them.
          pip install fastapi uvicorn pydantic httpx requests psutil keyring \
                      python-dotenv numpy scipy mutagen soundfile

      - name: Lint with ruff
        run: ruff check app/ tests/ || true   # 385 errors remain (mostly style); promoted to strict once cleanup follow-up lands

      - name: Check formatting with ruff
        run: ruff format --check app/ tests/ || true   # paired with ruff check — strict mode arrives together

      - name: Type-check with mypy
        run: mypy app/ || true   # gradual typing — non-blocking until type-hint pass completes

      - name: Run pytest
        run: pytest tests/ -v --tb=short   # all 194 tests must pass — Phase 6 baseline

  rust-lint-test:
    name: Rust — clippy + cargo test
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Stub Tauri sidecar binary
        # `src-tauri/build.rs` resolves the bundled Python sidecar before
        # compilation. CI doesn't build the sidecar (huge, separate
        # pipeline) so we drop a zero-byte placeholder. clippy + check
        # don't read it; bundling does, but that happens in the release
        # workflow, not here.
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force -Path src-tauri/binaries/RB_Backend-x86_64-pc-windows-msvc.exe | Out-Null

      - name: Clippy
        # 20 pre-existing warnings in metadata.rs / fingerprint.rs / etc. — strict mode promoted once cleared.
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-default-features || true

      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features --no-fail-fast

  frontend-lint:
    name: Frontend — eslint + prettier + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: ESLint
        run: npm run lint --prefix frontend || true   # not yet zero-warning baseline; promoted once cleanup hits steady-state

      - name: Prettier check
        run: npm run format:check --prefix frontend || true

      - name: Build (smoke)
        run: npm run build --prefix frontend
