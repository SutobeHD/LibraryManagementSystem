# Real-world DJ track-title corpus for app/external_track_match.py.
#
# Each record drives test_parse_version_tag_label_recall: parse_version_tag(title)
# must return a VersionTag whose .label matches `label` for >=95% of records.
# Records with `label: null` carry NO recognised version suffix -> parse must
# return None.
#
# Optional keys (checked by dedicated tests, not the recall sweep):
#   remixer    -- expected VersionTag.remixer
#   modifiers  -- expected VersionTag.modifiers (list -> tuple at load time)
#   stem       -- expected extract_title_stem(title)
#
# Format note: this file is intentionally a flat list of simple mappings so it
# loads with a minimal stdlib parser (no PyYAML dependency). Keep values as
# plain double-quoted scalars; no nested structures except the `modifiers` list.

